filters:
  - nutshell
execute:
  freeze: true
project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "*.md"
website:
  title: "Siddharth Vishwanath"
  favicon: icons/icon-48x48.png
  twitter-card: true
  open-graph: true
  google-analytics: "UA-41844991-1"
  description: "Homepage"
  page-footer:
    left: '[© Siddharth Vishwanath • 2026]{style="color: var(--highlightColor);"}'
    right: "Built with [Quarto](https://quarto.org/)"
    center:
        - text: "{{< fa brands github >}}"
          url: https://github.com/sidv23 
        - text: "{{< fa brands linkedin >}}"
          url: https://www.linkedin.com/in/sidv23/
        - text: "{{< ai google-scholar >}}"
          url: https://scholar.google.com/citations?user=7TQaHEEAAAAJ&hl=en&sortby=pubdate
  navbar:
    align: center
    logo: icons/icon-192x192.png
    title: false
    pinned: true
    search: true
    style: fixed
    # background: light
    # background: dark
    collapse-level: 1
    # right:
    #   - icon: github
    #     href: https://github.com/
    #   - icon: twitter
    #     href: https://twitter.com
    # left:
    right:
    - href: /
      text: Home
    - href: research.qmd
      text: Research
    - href: teaching.qmd
      text: Teaching
    - href: talks.qmd
      text: Talks
    - href: CV.qmd
      text: CV
    - href: 404.qmd
      text: $\zeta(-1)$
format:
  html:
    theme: 
      - cosmo
      # - theme/css/theme.scss
      # light: simplex
      # dark: slate
    css: 
      - theme/css/colors.css
      - theme/css/fonts.css
      - theme/css/custom.css
      - theme/css/publications.css
      - theme/css/styles.css
      - theme/css/nutshell.css
    toc: true
    html-math-method: katex
    include-in-header:
      file: theme/html/header.html
    include-after-body: 
      file: theme/html/footer.html